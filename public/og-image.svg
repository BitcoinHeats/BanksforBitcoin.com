<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1206"/>
      <stop offset="55%" stop-color="#241803"/>
      <stop offset="100%" stop-color="#0d0a04"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBB034"/>
      <stop offset="100%" stop-color="#F7931A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F7931A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo badge -->
  <g transform="translate(110 175)">
    <rect width="170" height="170" rx="40" fill="url(#badge)"/>
    <g transform="translate(85 85) scale(2.66) translate(-32 -32)" fill="#ffffff">
      <path d="M32 12 L51 23 H13 Z"/>
      <rect x="17" y="27" width="4.5" height="16" rx="1"/>
      <rect x="25" y="27" width="4.5" height="16" rx="1"/>
      <rect x="34.5" y="27" width="4.5" height="16" rx="1"/>
      <rect x="42.5" y="27" width="4.5" height="16" rx="1"/>
      <rect x="13" y="46" width="38" height="4" rx="1.5"/>
      <rect x="10" y="51" width="44" height="3.5" rx="1.75"/>
    </g>
    <text x="85" y="51" text-anchor="middle" font-size="34" font-weight="700" fill="#F7931A" font-family="Arial, Helvetica, sans-serif">₿</text>
  </g>

  <!-- Wordmark -->
  <text x="320" y="250" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Banks<tspan fill="#F7931A">for</tspan>Bitcoin<tspan fill="#9a8c72">.com</tspan></text>

  <!-- Tagline -->
  <text x="322" y="312" font-family="Arial, Helvetica, sans-serif" font-size="33" font-weight="600" letter-spacing="2" fill="#F7931A">BANKS THAT WORK WELL WITH BITCOIN</text>

  <!-- Subtext -->
  <text x="322" y="372" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#d9cfbe">A simple, beginner-friendly guide to banks &amp; apps</text>
  <text x="322" y="412" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#d9cfbe">that let you buy Bitcoin without getting frozen.</text>

  <!-- Feature chips -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600">
    <g transform="translate(322 470)">
      <rect width="250" height="58" rx="29" fill="#F7931A" fill-opacity="0.14" stroke="#F7931A" stroke-opacity="0.5"/>
      <text x="125" y="38" text-anchor="middle" fill="#FBB034">Buy Bitcoin easily</text>
    </g>
    <g transform="translate(592 470)">
      <rect width="232" height="58" rx="29" fill="#F7931A" fill-opacity="0.14" stroke="#F7931A" stroke-opacity="0.5"/>
      <text x="116" y="38" text-anchor="middle" fill="#FBB034">Self-custody ready</text>
    </g>
    <g transform="translate(844 470)">
      <rect width="218" height="58" rx="29" fill="#F7931A" fill-opacity="0.14" stroke="#F7931A" stroke-opacity="0.5"/>
      <text x="109" y="38" text-anchor="middle" fill="#FBB034">Newbie friendly</text>
    </g>
  </g>
</svg>
